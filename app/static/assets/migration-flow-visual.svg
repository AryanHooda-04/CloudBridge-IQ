<svg width="760" height="360" viewBox="0 0 760 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cloud migration assessment flow">
  <style>
    .panel { fill: #ffffff; stroke: #c8d6e8; stroke-width: 2; }
    .soft { fill: #f4f8fc; }
    .title { font: 700 18px system-ui, sans-serif; fill: #172033; }
    .label { font: 700 12px system-ui, sans-serif; fill: #5d6e86; }
    .node { filter: drop-shadow(0 10px 16px rgba(15, 34, 61, .12)); }
    .flow { stroke: #1f6feb; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 12; animation: dash 3.4s linear infinite; }
    .flow.alt { stroke: #34a853; animation-duration: 4.2s; }
    .pulse { transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
    .float { animation: float 5s ease-in-out infinite; }
    .float.delay { animation-delay: -1.8s; }
    @keyframes dash { to { stroke-dashoffset: -88; } }
    @keyframes pulse { 0%, 100% { opacity: .82; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  </style>
  <rect width="760" height="360" rx="28" fill="#eef5fb"/>
  <path d="M0 276H760" stroke="#dce6f2"/>
  <path d="M58 60H702" stroke="#dce6f2"/>
  <g opacity=".48">
    <path d="M80 0V360M180 0V360M280 0V360M380 0V360M480 0V360M580 0V360M680 0V360" stroke="#dce6f2"/>
    <path d="M0 120H760M0 220H760M0 320H760" stroke="#dce6f2"/>
  </g>

  <g class="float">
    <rect class="panel" x="48" y="96" width="166" height="154" rx="22"/>
    <rect class="soft" x="72" y="126" width="118" height="16" rx="8"/>
    <rect class="soft" x="72" y="156" width="92" height="16" rx="8"/>
    <rect class="soft" x="72" y="186" width="130" height="16" rx="8"/>
    <circle cx="92" cy="222" r="14" fill="#ff9900"/>
    <circle cx="132" cy="222" r="14" fill="#0078d4"/>
    <circle cx="172" cy="222" r="14" fill="#34a853"/>
    <text class="title" x="72" y="84">Source</text>
    <text class="label" x="72" y="274">Inventory and relationships</text>
  </g>

  <g>
    <path class="flow" d="M226 172C268 172 282 112 326 112"/>
    <path class="flow alt" d="M226 190C274 190 284 236 326 236"/>
  </g>

  <g class="pulse">
    <rect x="318" y="88" width="124" height="184" rx="28" fill="#102b4d"/>
    <path d="M380 126L414 145V184L380 203L346 184V145L380 126Z" fill="#1f6feb"/>
    <path d="M380 147V182M362 157L380 147L398 157M362 174L380 184L398 174" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="344" y="218" width="72" height="14" rx="7" fill="#dbeafe"/>
    <rect x="358" y="242" width="44" height="10" rx="5" fill="#93c5fd"/>
    <text class="title" x="323" y="66">CloudBridge IQ</text>
    <text class="label" x="334" y="296">Detect, map, score</text>
  </g>

  <g>
    <path class="flow" d="M454 112C502 112 510 170 548 170"/>
    <path class="flow alt" d="M454 236C506 236 512 198 548 198"/>
  </g>

  <g class="float delay">
    <rect class="panel" x="548" y="96" width="164" height="154" rx="22"/>
    <rect x="578" y="124" width="44" height="44" rx="13" fill="#ff9900"/>
    <rect x="638" y="124" width="44" height="44" rx="13" fill="#0078d4"/>
    <rect x="578" y="186" width="44" height="44" rx="13" fill="#34a853"/>
    <rect x="638" y="186" width="44" height="44" rx="13" fill="#d33682"/>
    <path d="M600 138V154M592 146H608M660 138V154M652 146H668M600 200V216M592 208H608M660 200V216M652 208H668" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text class="title" x="572" y="84">Target</text>
    <text class="label" x="572" y="274">Architecture and decision memo</text>
  </g>
</svg>
